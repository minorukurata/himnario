<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Himnario Adventista — 日本語・Español</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0C1A28;--navy2:#142030;--navy3:#1C2E40;
  --gold:#C9A84C;--gold2:#E8D08A;--gold3:#F5E8B4;
  --white:#F4EFE6;--muted:#7A9BB5;--dim:#4A6A85;
  --esp:#E8D08A;--jpn:#A8D8B0;--jpn2:#7ABC8A;
  --red:#B85050;--green:#4A8A5A;
  --radius:3px;
}
html{height:100%;background:#060E18}
body{
  min-height:100vh;background:var(--navy);
  color:var(--white);
  font-family:"IM Fell English",serif;
  overflow:hidden;
  display:flex;flex-direction:column;
}

/* ─── BACKGROUND ─── */
#bgc{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ─── FRAME ─── */
.frame-line{position:fixed;background:var(--gold);pointer-events:none;z-index:8;opacity:.6}
.fl-t{top:0;left:0;right:0;height:2px}
.fl-b{bottom:0;left:0;right:0;height:2px}
.fl-l{top:2px;left:0;bottom:2px;width:1px;opacity:.3}
.fl-r{top:2px;right:0;bottom:2px;width:1px;opacity:.3}
.corner-mark{position:fixed;z-index:9;pointer-events:none}
.corner-mark::before,.corner-mark::after{content:'';position:absolute;background:var(--gold);opacity:.7}
.corner-mark::before{width:24px;height:1.5px;top:0;left:0}
.corner-mark::after{width:1.5px;height:24px;top:0;left:0}
.cm-tl{top:10px;left:10px}
.cm-tr{top:10px;right:10px;transform:rotate(90deg)}
.cm-bl{bottom:10px;left:10px;transform:rotate(270deg)}
.cm-br{bottom:10px;right:10px;transform:rotate(180deg)}

/* ─── LAYOUT ─── */
#app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:5}

/* ─── HEADER ─── */
#hdr{
  flex-shrink:0;
  display:flex;align-items:center;
  gap:clamp(6px,2vw,16px);
  padding:clamp(8px,1.5vh,14px) clamp(12px,3vw,24px);
  border-bottom:1px solid rgba(201,168,76,.2);
  background:rgba(12,26,40,.95);
  backdrop-filter:blur(8px);
}
#menu-btn{
  background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.35);
  color:var(--gold);width:clamp(30px,5vw,38px);height:clamp(30px,5vw,38px);
  cursor:pointer;font-size:1rem;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;border-radius:var(--radius);
}
#menu-btn:hover{background:rgba(201,168,76,.25)}
#search-wrap{
  flex:1;position:relative;max-width:400px;
}
#search{
  width:100%;background:rgba(255,255,255,.06);
  border:1px solid rgba(201,168,76,.25);
  color:var(--white);
  padding:clamp(5px,1vh,9px) clamp(10px,2vw,16px);
  font-family:"IM Fell English",serif;
  font-size:clamp(.8rem,1.8vw,1rem);
  border-radius:var(--radius);
  outline:none;
  transition:border-color .2s;
}
#search::placeholder{color:var(--dim)}
#search:focus{border-color:var(--gold)}
#hdr-title{
  font-family:"Cinzel",serif;
  font-size:clamp(.7rem,1.8vw,1rem);
  color:var(--gold2);letter-spacing:.1em;
  white-space:nowrap;flex-shrink:0;
}
#hdr-num{
  font-family:"Cinzel",serif;
  font-size:clamp(.65rem,1.5vw,.85rem);
  color:var(--muted);letter-spacing:.05em;
  flex-shrink:0;margin-left:auto;
}
#lang-toggle{
  flex-shrink:0;display:flex;gap:4px;
}
.lt-btn{
  padding:clamp(3px,.8vh,6px) clamp(6px,1.5vw,10px);
  font-family:"Cinzel",serif;font-size:.65rem;letter-spacing:.08em;
  border:1px solid rgba(201,168,76,.25);
  background:transparent;color:var(--muted);
  cursor:pointer;transition:all .2s;border-radius:var(--radius);
}
.lt-btn.on{background:rgba(201,168,76,.2);color:var(--gold2);border-color:var(--gold)}

/* ─── MAIN CONTENT ─── */
#main{flex:1;overflow:hidden;position:relative}

/* ─── PRESENTATION VIEW ─── */
#present-view{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  opacity:1;transition:opacity .3s;
}
#present-view.hidden{opacity:0;pointer-events:none}

.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  opacity:0;transition:opacity .6s ease;pointer-events:none;
}
.slide.active{opacity:1;pointer-events:auto}

/* Title/Welcome slide */
.welcome-slide{
  align-items:center;justify-content:center;
  padding:8% 10%;text-align:center;
}
.ws-title{
  font-family:"Cinzel",serif;
  font-size:clamp(2rem,6vw,5rem);
  color:var(--white);letter-spacing:.06em;line-height:1.2;
  text-shadow:0 4px 20px rgba(0,0,0,.6);
  margin-bottom:.3em;
}
.ws-jp{
  font-family:"Noto Serif JP",serif;
  font-size:clamp(1.4rem,4vw,3.2rem);
  color:var(--jpn);letter-spacing:.08em;
  margin-bottom:.6em;
}
.ws-rule{width:min(300px,50vw);height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:.8em auto}
.ws-sub{font-size:clamp(.75rem,1.8vw,1.1rem);color:var(--muted);letter-spacing:.12em}
.cross-icon{position:relative;width:20px;height:32px;margin:1.2em auto 0}
.cross-icon::before{content:'';position:absolute;left:50%;transform:translateX(-50%);width:4px;height:100%;background:var(--gold);border-radius:1px}
.cross-icon::after{content:'';position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);width:100%;height:4px;background:var(--gold);border-radius:1px}

/* Hymn slide */
.hymn-slide{
  padding:clamp(8px,2vh,20px) clamp(12px,3vw,36px);
  padding-bottom:clamp(50px,8vh,70px);
}
.hymn-hdr{
  flex-shrink:0;
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:1rem;
  border-bottom:1px solid rgba(201,168,76,.2);
  padding-bottom:clamp(5px,1vh,10px);
  margin-bottom:clamp(6px,1.5vh,14px);
}
.hymn-num-badge{
  font-family:"Cinzel",serif;
  font-size:clamp(1.4rem,4vw,3rem);
  color:var(--gold);line-height:1;
  flex-shrink:0;
}
.hymn-titles{flex:1}
.hymn-title-esp{
  font-family:"Cinzel",serif;
  font-size:clamp(.9rem,2.5vw,1.6rem);
  color:var(--esp);letter-spacing:.08em;line-height:1.3;
}
.hymn-title-jp{
  font-family:"Noto Serif JP",serif;
  font-size:clamp(.7rem,1.8vw,1.1rem);
  color:var(--jpn);letter-spacing:.06em;
  margin-top:3px;
}
.hymn-stanza-info{
  font-family:"Cinzel",serif;
  font-size:clamp(.55rem,1.2vw,.75rem);
  color:var(--muted);letter-spacing:.05em;
  flex-shrink:0;text-align:right;
}
.stanza-dots{display:flex;gap:4px;justify-content:flex-end;margin-top:4px}
.sdot{width:6px;height:6px;border-radius:50%;background:rgba(201,168,76,.2)}
.sdot.on{background:var(--gold)}

/* Lyrics body */
.lyrics-body{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;gap:0;
}
/* Two-language layout */
.stanza-block{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  flex:1;gap:0;
  padding:0 clamp(4px,2vw,24px);
}
.lang-esp,.lang-jp{
  display:flex;flex-direction:column;align-items:center;
  width:100%;
}
.lang-esp{margin-bottom:clamp(4px,1.2vh,14px)}
.lang-divider{
  width:min(200px,40vw);height:1px;
  background:linear-gradient(to right,transparent,rgba(201,168,76,.3),transparent);
  margin:clamp(3px,.8vh,10px) auto;flex-shrink:0;
}

.ll{
  font-family:"IM Fell English",serif;
  text-align:center;line-height:1.45;
  opacity:0;transform:translateY(8px);
  transition:opacity .45s ease,transform .45s ease;
  white-space:pre-wrap;word-break:break-word;max-width:100%;
}
.ll.v{opacity:1;transform:translateY(0)}
.ll-jp{font-family:"Noto Serif JP",serif;line-height:1.5}
.ll-esp{color:var(--esp)}
.ll-jp{color:var(--jpn)}
.ll-chorus-esp{font-style:italic;color:var(--gold3)}
.ll-chorus-jp{font-style:italic;color:var(--jpn2)}
.ll-loading{color:var(--muted);font-style:italic}
.ll-err{color:var(--red)}

/* ruby */
ruby{ruby-align:center}
rt{font-size:.4em;color:rgba(168,216,176,.55);font-family:"Noto Sans JP",sans-serif;font-weight:300}

/* footer */
.slide-footer{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;gap:1%;
  padding-top:clamp(4px,1vh,8px);
}
.sf-line{flex:1;max-width:60px;height:1px;background:linear-gradient(to right,transparent,var(--gold));opacity:.2}
.sf-line.r{background:linear-gradient(to left,transparent,var(--gold))}
.sf-pg{font-family:"Cinzel",serif;font-size:clamp(.5rem,1.2vw,.75rem);color:var(--gold);opacity:.35;letter-spacing:.06em}

/* ─── NAV ─── */
#nav{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:center;
  gap:clamp(6px,2vw,14px);
  padding:clamp(6px,1.3vh,12px) clamp(8px,2vw,20px);
  background:linear-gradient(transparent,rgba(6,14,24,.96));
}
.nbtn{
  background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.35);
  color:var(--gold2);padding:clamp(5px,1vh,9px) clamp(12px,3vw,24px);
  cursor:pointer;font-family:"Cinzel",serif;
  font-size:clamp(.6rem,1.6vw,.9rem);letter-spacing:.08em;
  transition:background .2s;border-radius:var(--radius);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.nbtn:active,.nbtn:hover{background:rgba(201,168,76,.28)}
.nbtn:disabled{opacity:.18;cursor:default}
#pg{font-family:"Cinzel",serif;font-size:clamp(.6rem,1.5vw,.85rem);color:var(--muted);letter-spacing:.04em;min-width:70px;text-align:center}

/* ─── SIDEBAR ─── */
#overlay{position:fixed;inset:0;z-index:25;background:rgba(0,0,0,.6);display:none}
#overlay.show{display:block}
#sidebar{
  position:fixed;left:0;top:0;bottom:0;width:min(320px,88vw);
  background:rgba(6,14,24,.98);border-right:1px solid rgba(201,168,76,.18);
  z-index:30;transform:translateX(-100%);transition:transform .32s ease;
  display:flex;flex-direction:column;
}
#sidebar.open{transform:translateX(0)}
#sb-hdr{
  flex-shrink:0;padding:clamp(10px,2vh,16px) clamp(12px,3vw,18px);
  border-bottom:1px solid rgba(201,168,76,.15);
  background:rgba(6,14,24,.98);
}
#sb-hdr-title{font-family:"Cinzel",serif;font-size:clamp(.8rem,2vw,.95rem);color:var(--gold);letter-spacing:.1em}
#sb-search{
  margin-top:8px;width:100%;background:rgba(255,255,255,.06);
  border:1px solid rgba(201,168,76,.2);color:var(--white);
  padding:7px 12px;font-family:"IM Fell English",serif;font-size:.85rem;
  border-radius:var(--radius);outline:none;
}
#sb-search::placeholder{color:var(--dim)}
#sb-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:clamp(7px,1.4vh,11px) clamp(12px,3vw,18px);
  cursor:pointer;transition:background .15s;
  border-left:2px solid transparent;
}
.sb-item:hover{background:rgba(201,168,76,.07)}
.sb-item.cur{border-left-color:var(--gold);background:rgba(201,168,76,.05)}
.sb-num{font-family:"Cinzel",serif;font-size:.8rem;color:var(--gold);width:36px;flex-shrink:0}
.sb-title-esp{font-family:"IM Fell English",serif;font-size:.82rem;color:var(--white);display:block}
.sb-title-jp{font-family:"Noto Serif JP",serif;font-size:.68rem;color:var(--jpn);display:block;margin-top:1px}
.sb-has-jp{width:6px;height:6px;border-radius:50%;background:var(--jpn2);flex-shrink:0;opacity:.7}
.sb-no-jp{width:6px;height:6px;border-radius:50%;border:1px solid var(--muted);flex-shrink:0;opacity:.4}

/* ─── BROWSE VIEW ─── */
#browse-view{
  position:absolute;inset:0;overflow-y:auto;
  display:flex;flex-direction:column;gap:0;
  padding:0 0 60px;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#browse-view.show{opacity:1;pointer-events:auto}
.browse-section{padding:clamp(8px,2vh,16px) clamp(12px,3vw,24px) 0}
.browse-section-title{
  font-family:"Cinzel",serif;font-size:.7rem;letter-spacing:.15em;
  text-transform:uppercase;color:var(--muted);
  border-bottom:1px solid rgba(201,168,76,.1);
  padding-bottom:6px;margin-bottom:8px;
}
.browse-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(clamp(140px,22vw,200px),1fr));
  gap:clamp(6px,1.5vw,10px);
}
.browse-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.12);
  padding:clamp(8px,1.5vh,12px) clamp(8px,1.5vw,12px);
  cursor:pointer;transition:all .2s;border-radius:var(--radius);
  position:relative;
}
.browse-card:hover{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.4)}
.bc-num{font-family:"Cinzel",serif;font-size:.75rem;color:var(--gold);margin-bottom:3px}
.bc-title{font-family:"IM Fell English",serif;font-size:clamp(.72rem,1.6vw,.88rem);color:var(--white);line-height:1.3}
.bc-jp{font-family:"Noto Serif JP",serif;font-size:.62rem;color:var(--jpn);margin-top:3px}
.bc-jp-dot{position:absolute;top:6px;right:6px;width:5px;height:5px;border-radius:50%;background:var(--jpn2);opacity:.6}

/* ─── SEARCH RESULTS ─── */
#search-results{
  position:absolute;top:100%;left:0;right:0;z-index:50;
  background:rgba(6,14,24,.98);border:1px solid rgba(201,168,76,.25);
  max-height:300px;overflow-y:auto;border-radius:0 0 var(--radius) var(--radius);
}
.sr-item{
  padding:clamp(6px,1.2vh,10px) clamp(10px,2vw,16px);
  cursor:pointer;transition:background .15s;
  display:flex;align-items:center;gap:10px;
}
.sr-item:hover{background:rgba(201,168,76,.1)}
.sr-num{font-family:"Cinzel",serif;font-size:.75rem;color:var(--gold);width:30px;flex-shrink:0}
.sr-title-esp{font-family:"IM Fell English",serif;font-size:.85rem;color:var(--white)}
.sr-title-jp{font-family:"Noto Serif JP",serif;font-size:.7rem;color:var(--jpn);margin-top:1px}

/* ─── LOADING OVERLAY ─── */
#loading{
  position:fixed;inset:0;z-index:100;
  background:rgba(6,14,24,.85);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;opacity:0;pointer-events:none;transition:opacity .2s;
}
#loading.show{opacity:1;pointer-events:auto}
.loading-spinner{
  width:32px;height:32px;border:2px solid rgba(201,168,76,.2);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:"Cinzel",serif;font-size:.8rem;color:var(--muted);letter-spacing:.1em}

/* ─── EDITOR PANEL ─── */
#editor-panel{
  position:fixed;right:0;top:0;bottom:0;width:min(400px,90vw);
  background:rgba(6,14,24,.99);border-left:1px solid rgba(201,168,76,.18);
  z-index:40;transform:translateX(100%);transition:transform .32s ease;
  display:flex;flex-direction:column;
}
#editor-panel.open{transform:translateX(0)}
#ep-hdr{
  flex-shrink:0;padding:12px 16px;
  border-bottom:1px solid rgba(201,168,76,.15);
  display:flex;align-items:center;justify-content:space-between;
}
#ep-hdr-title{font-family:"Cinzel",serif;font-size:.85rem;color:var(--gold);letter-spacing:.08em}
#ep-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;padding:2px 6px}
#ep-close:hover{color:var(--gold)}
#ep-body{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
#ep-body label{font-family:"Cinzel",serif;font-size:.7rem;color:var(--muted);letter-spacing:.08em;display:block;margin-bottom:4px}
#ep-body textarea{
  width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.2);
  color:var(--white);padding:8px 10px;font-family:"Noto Sans JP",sans-serif;font-size:.8rem;
  resize:vertical;border-radius:var(--radius);outline:none;min-height:80px;
}
#ep-body textarea:focus{border-color:var(--gold)}
#ep-save{
  margin:0 16px 16px;
  background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);
  color:var(--gold2);padding:10px;cursor:pointer;
  font-family:"Cinzel",serif;font-size:.8rem;letter-spacing:.1em;
  border-radius:var(--radius);transition:background .2s;
}
#ep-save:hover{background:rgba(201,168,76,.3)}

/* ─── PETAL ─── */
.petal{position:fixed;width:7px;height:10px;background:rgba(168,216,176,.08);border-radius:50% 0 50% 0;pointer-events:none;z-index:1;animation:pfall linear infinite}
@keyframes pfall{0%{transform:translateY(-20px) rotate(0deg);opacity:0}8%{opacity:.6}90%{opacity:.1}100%{transform:translateY(110vh) rotate(660deg);opacity:0}}

/* ─── UTIL ─── */
.hidden{display:none!important}
@media(max-width:480px){
  .hymn-hdr{flex-wrap:wrap}
  .hymn-num-badge{font-size:1.8rem}
}
</style>
</head>
<body>

<!-- Background -->
<canvas id="bgc"></canvas>

<!-- Frame -->
<div class="frame-line fl-t"></div>
<div class="frame-line fl-b"></div>
<div class="frame-line fl-l"></div>
<div class="frame-line fl-r"></div>
<div class="corner-mark cm-tl"></div>
<div class="corner-mark cm-tr"></div>
<div class="corner-mark cm-bl"></div>
<div class="corner-mark cm-br"></div>

<!-- Loading -->
<div id="loading"><div class="loading-spinner"></div><div class="loading-text">Cargando himno...</div></div>

<!-- Sidebar -->
<div id="overlay"></div>
<div id="sidebar">
  <div id="sb-hdr">
    <div id="sb-hdr-title">Himnario Adventista — 希望の賛美歌</div>
    <input id="sb-search" type="text" placeholder="Buscar himno...">
  </div>
  <div id="sb-list"></div>
</div>

<!-- Editor -->
<div id="editor-panel">
  <div id="ep-hdr">
    <span id="ep-hdr-title">Editar Japonés</span>
    <button id="ep-close">×</button>
  </div>
  <div id="ep-body">
    <div><label>Número de Himno</label><input id="ep-num" type="number" style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.2);color:var(--white);padding:6px 10px;font-family:monospace;border-radius:3px;outline:none" readonly></div>
    <div><label>Título en Japonés</label><input id="ep-title-jp" type="text" style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.2);color:var(--white);padding:6px 10px;font-family:'Noto Sans JP',sans-serif;border-radius:3px;outline:none"></div>
    <div><label>Letra en Japonés (cada línea = una línea, verso separado por línea en blanco)</label><textarea id="ep-lyrics-jp" rows="10"></textarea></div>
    <div style="font-size:.7rem;color:var(--muted);font-family:Cinzel,serif;letter-spacing:.05em">Los cambios se guardan localmente en este dispositivo.</div>
  </div>
  <button id="ep-save">Guardar Cambios</button>
</div>

<!-- App -->
<div id="app">
  <!-- Header -->
  <div id="hdr">
    <button id="menu-btn">☰</button>
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Buscar por número, título...">
      <div id="search-results"></div>
    </div>
    <div id="hdr-title">Himnario</div>
    <div id="lang-toggle">
      <button class="lt-btn on" data-lang="esp" title="Español">ESP</button>
      <button class="lt-btn on" data-lang="jpn" title="日本語">JPN</button>
    </div>
    <div id="hdr-num">— / 695</div>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Presentation view -->
    <div id="present-view">
      <div id="slides-wrap" style="position:absolute;inset:0">

arar;","tú eres el camino, la verdad y la luz,","y al que te sigue llevas hasta la cruz."],["Tu gracia me sostiene en todo el caminar,","tu brazo poderoso me puede sustentar;","en ti yo tengo todo: descanso, paz y amor,","bendito y adorado seas, mi Salvador."]]},"77":{"title":"¡Oh, Cuánto Amo a Cristo!","verses":[["¿Me preguntáis qué es lo que tanto quiero?","Diré con gozo lo que amo yo:","es Cristo Jesús, mi Rey y mi Señero,","a quien mi alma con amor cantó."],["Es él mi apoyo cuando flaqueo,","mi fortaleza en la tribulación;","cuando el peligro cerca a mí veo,","él es mi amparo y mi salvación."]]},"95":{"title":"Llena Mi Copa, Señor","verses":[["Llena mi copa, Señor, yo te pido hoy,","en la plenitud de tu Espíritu Santo;","llena mi copa, Señor, hacia ti me voy,","necesito tu gracia y tu manto."]],"chorus":["Llena mi copa, llénala hoy,","llena mi copa, te lo pido, Señor;","ven y llena mi copa,","llena mi copa, Señor."]},"99":{"title":"El Señor Es Mi Fuerza","verses":[["El Señor es mi fuerza y mi escudo,","en él confío y me ayudará;","mi corazón en él se ha refugiado,","su gran poder me sostendrá."],["Cantad al Señor con alegría,","tributadle toda la honra y honor;","reconoced que él es vuestra guía,","alabadle a él, vuestro Salvador."]]},"102":{"title":"Cristo Me Ama","verses":[["Cristo me ama, bien lo sé,","su Palabra me hace ver","que los niños son de aquel","quien es nuestro amigo fiel."],["Cristo me ama, pues murió,","mis pecados él tomó,","las puertas del cielo abrió,","y al pecado condenó."],["Cristo me ama, él es rey,","reina de la eternidad;","cuando al cielo voy a ver,","tendré yo felicidad."]],"chorus":["Sí, Cristo me ama,","sí, Cristo me ama,","sí, Cristo me ama,","la Biblia dice así."]},"119":{"title":"Sublime Gracia","verses":[["Sublime gracia del Señor","que a un infeliz salvó;","fui ciego mas hoy veo yo,","perdido y él me halló."],["Su gracia me enseñó a temer,","mis dudas ahuyentó;","¡Oh, cuán precioso fue a mi ser","cuando él me transformó!"],["Y cuando en Sión por siglos mil","brillando esté cual sol,","yo cantaré por siempre aquí","su amor que me salvó."]]},"144":{"title":"Tal Como Soy","verses":[["Tal como soy, sin más decir,","a ti, Cordero de Dios, a ti,","quien por mis culpas mala aquí,","a ti acudo, Señor."],["Tal como soy, busco tu paz,","para el alma que no la hay;","oh Dios de amor, sin más esperar,","a ti acudo, Señor."],["Tal como soy, tu amor y fe","me aceptan tal cual yo esté;","perdón, limpieza, gozo y fe,","todo lo encuentro en ti."]]},"158":{"title":"Cuán Grande es Él","verses":[["Señor mi Dios, al contemplar los cielos,","el firmamento y las estrellas mil,","al oír tu voz en los potentes truenos","y ver brillar al sol en su cenit."],["Al recorrer los montes y los valles,","y ver las flores, oír el ruiseñor,","al contemplar el río y la cascada,","entonces se engrandece en mí tu amor."],["Cuando recuerdo que en la cruz un día","cargó tu Hijo la deuda del mortal,","y que al vencer la muerte y la agonía,","me ofrece el don de vida celestial."]],"chorus":["¡Cuán grande es él! ¡Cuán grande es él!","Mi corazón entona esta canción:","¡Cuán grande es él! ¡Cuán grande es él!"]},"178":{"title":"Sublime Es el Amor","verses":[["Sublime es el amor de Dios al hombre,","mayor que el oceano sin igual;","su gracia nunca pierde fuerza o nombre,","su luz jamás dejará de brillar."],["Si el cielo fuera pergamino blanco","y el mar pudiera ser el escritor,","no bastaría para escribir el canto","de su eterno, incomparable amor."]]},"252":{"title":"El Buen Pastor","verses":[["El buen pastor mi alma guarda,","nada faltará en verdad;","en frescos prados me hace reposar,","junto a aguas de tranquilidad."],["Aunque por valle tenebroso","caminos peligrosos haya yo,","no temeré peligro ni dolor,","pues el buen pastor está con mí."],["Confortas tú mi alma contigo,","tu vara y tu cayado me da aliento;","y delante de mis enemigos","mi mesa dispones en el viento."]]},"267":{"title":"Jesús Es Mi Rey Soberano","verses":[["Jesús es mi Rey soberano,","mi gozo es cantarle loor;","es Rey, y me ve cual hermano,","es Rey y me llama su amor."],["Dejando su trono de gloria,","me vino a sacar de la red;","ganó mi salud y victoria,","allá en la cruz de El Calvario."],["Me guarda con brazo potente,","en todo camino y lugar;","y alienta mi alma doliente","con su paz que excede a todo hablar."]],"chorus":["¡Le adoro, le adoro,","le alabo, le alabo!","mi Rey, Señor Jesús."]},"300":{"title":"Firmes y Adelante","verses":[["Firmes y adelante, huestes de la fe,","sin temor alguno, que Jesús nos ve;","jefe soberano, Cristo al frente va,","y la regia enseña triunfará."],["Al sagrado nombre de nuestro adalid","tiembla el enemigo y huye de la lid;","él, con su estandarte, nos llevará","y la santa causa triunfará."],["Fuertes en la lucha, más que vencedores,","somos por la gracia de los redentores;","gloria, honor y honra tributad","al que salvación os ha comprado."]],"chorus":["Firmes y adelante,","huestes de la fe,","sin temor alguno,","que Jesús nos ve."]},"304":{"title":"Mi Esperanza Firme Está","verses":[["Mi esperanza firme está","en el Cristo que me amó,","todo lo que necesito","sólo él lo puede dar."],["En el mar tempestuoso","cuando agita el vendaval,","él me guarda y me sostiene,","él me da tranquilidad."],["Y por fin cuando mi vida","llegue a su fiel término,","lo veré cara a cara","al Cordero del Señor."]]},"316":{"title":"El Señor Es Mi Pastor","verses":[["El Señor es mi pastor,","nada me faltará;","en lugares de verdes pastos","me hará descansar."],["Junto a aguas de reposo","él me pastoreará;","confortará mi alma","y me guiará."],["Aunque ande en valle de sombra","de muerte, no temeré;","tú estás conmigo, tu vara","y tu cayado me cuidarán."]]},"338":{"title":"Yo Tengo Gozo en Mi Alma","verses":[["Yo tengo gozo en mi alma hoy,","gozo, gozo, gozo;","desde que el Señor me perdonó","gozo tengo en mi alma."],["Yo tengo paz en mi alma hoy,","paz, paz, paz;","desde que el Señor me perdonó","paz tengo en mi alma."],["Yo tengo amor en mi alma hoy,","amor, amor, amor;","desde que el Señor me perdonó","amor tengo en mi alma."]]},"354":{"title":"Hay Un Precioso Manantial","verses":[["Hay un precioso manantial","de sangre de Emanuel,","que limpia a cada pecador","que se sumerge en él."],["El ladrón moribundo vio","aquel bendito río,","y antes que oscureciese el sol","se hallaba salvo ya."],["Querido Cordero de Dios,","yo soy el pecador,","tú derramaste allí tu sangre","y me lavó Señor."]]},"366":{"title":"En la Cruz","verses":[["En la cruz, en la cruz","do primero vi la luz,","y las manchas de mi alma yo lavé;","fue allí por fe do vi a Jesús,","y siempre feliz con él seré."],["En la cruz el Cordero por mí murió,","mi deuda pagó al morir;","con su sangre me limpió de todo mal,","y puedo ahora a Dios servir."]]},"384":{"title":"¡Oh, Cuánto le Amo!","verses":[["¡Oh, cuánto le amo! ¡oh, cuánto le amo!","¡oh, cuánto le amo a mi Señor!","¡oh, cuánto le amo! ¡oh, cuánto le amo!","¡oh, cuánto le amo a Jesús!"],["Él me salvó en la cruz del Calvario,","pagó mi deuda de mi pecado;","con amor eterno me ha amado,","¡oh, cuánto le amo a Jesús!"]]},"391":{"title":"Sion Nos Convoca","verses":[["Sion nos convoca en la entera unión,","que hay amor fraterno en la comunión;","donde hay amor y fraternidad,","allí está el Señor en su majestad."],["Cuando estamos juntos con amor,","sólo entonces vemos al Señor;","donde hay amor y fraternidad,","allí está el Señor en su majestad."]]},"459":{"title":"Maravillosa Gracia","verses":[["Maravillosa gracia de nuestro amante Dios,","más grande que la falta y que el pecado atroz;","allá en el Calvario Cristo la gracia mostró,","su sangre el precio fue, mi vida rescató."],["Gracia maravillosa, tan grande como el mar,","que lanza mis pecados muy lejos sin cesar;","llegué con mis pecados, me fui perdonado,","¡la gracia de Dios me ha liberado!"]]},"473":{"title":"Más Cerca, Dios, de Ti","verses":[["Más cerca, oh Dios, de ti,","más cerca quiero estar;","mi c const HALLE_P=/ハレルヤ|アーメン|ノエル|グロリア|アレルヤ|ホザナ/;
const VNUM_P=/^[１２３４５６７８91-9][.．、\s\u3000]/;

// ══════════════════════════════════════════
//  STANZA SPLITTER (Japanese)
// ══════════════════════════════════════════
function splitStanzas(lines){
  const stanzas=[],VP=/^[１２３４５６７８91-9][.．]/,CP=/（くりかえし）|（コーラス）/;
  let cur=[];
  for(const raw of lines){
    const l=raw.trim(); if(!l) continue;
    if((VP.test(l)||CP.test(l))&&cur.length){stanzas.push(cur);cur=[l];}
    else cur.push(l);
  }
  if(cur.length) stanzas.push(cur);
  return stanzas.length?stanzas:[lines];
}

// Stanza splitter for Spanish verses
function espStanzaIndex(verses,si){return verses&&verses[si]?verses[si]:null}

// ══════════════════════════════════════════
//  SLIDE STATE
// ══════════════════════════════════════════
let currentEspNum = null;   // current Spanish hymn number (1-695)
let currentStanzaIdx = 0;
let slideCache = {};        // espNum -> {esp_stanzas, jp_stanzas, title_jp}
let currentSlideEl = document.getElementById('slide-welcome');
const slidesWrap = document.getElementById('slides-wrap');

function totalStanzas(espNum){
  const c = slideCache[espNum]; if(!c) return 1;
  const espSt = (c.esp_stanzas||[]).length;
  const jpSt  = (c.jp_stanzas||[]).length;
  return Math.max(espSt, jpSt, 1);
}

// ══════════════════════════════════════════
//  FETCH LYRICS via Claude API
// ══════════════════════════════════════════
async function fetchLyrics(espNum, title){
  if(API_KEY === 'TU_API_KEY_AQUI') return null;
  try{
    const prompt = `Eres un experto en himnos adventistas. Dame la letra COMPLETA del himno adventista número ${espNum} "${title}" del Himnario Adventista en español (edición 2009), exactamente como está en el himnario.

Responde SOLO en JSON válido, sin markdown, sin explicaciones:
{
  "title": "título exacto",
  "verses": [
    ["línea 1 estrofa 1","línea 2 estrofa 1","..."],
    ["línea 1 estrofa 2","..."]
  ],
  "chorus": ["línea 1 coro","línea 2 coro"] 
}
Si no tiene coro, "chorus" debe ser null. Cada estrofa es un array de strings. Solo el JSON, nada más.`;

    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok) return null;
    const data = await res.json();
    const text = data.content?.find(c=>c.type==='text')?.text||'';
    const clean = text.replace(/```json|```/g,'').trim();
    return JSON.parse(clean);
  }catch(e){return null;}
}

// ══════════════════════════════════════════
//  BUILD SLIDE CACHE ENTRY
// ══════════════════════════════════════════
async function buildCache(espNum){
  if(slideCache[espNum]) return;
  const title = esp_titles[String(espNum)]||`Himno ${espNum}`;
  let espData = null;
  // Check hardcoded
  if(top_hymns[String(espNum)]){
    espData = top_hymns[String(espNum)];
  } else {
    // Try user cache in localStorage
    const stored = localStorage.getItem(`hymn_esp_${espNum}`);
    if(stored){try{espData=JSON.parse(stored);}catch{}}
  }
  // Get Japanese
  const jpBase = esp_to_jp[String(espNum)];
  // User edits override
  const userEdit = userJP[String(espNum)];
  let jp_stanzas=[], title_jp='';
  if(userEdit){
    title_jp = userEdit.title||'';
    jp_stanzas = splitStanzas(userEdit.lines||[]);
  } else if(jpBase){
    title_jp = jpBase.title_jp||'';
    jp_stanzas = splitStanzas(jpBase.lines||[]);
  }
  // Build ESP stanzas
  let esp_stanzas=[];
  if(espData){
    esp_stanzas = espData.verses||[];
    if(espData.chorus) esp_stanzas = esp_stanzas.flatMap((v,i)=>i===0?[v,espData.chorus]:[espData.chorus,v]).filter((v,i,a)=>JSON.stringify(v)!==JSON.stringify(a[i-1]||null));
  }
  slideCache[espNum] = {title, title_jp, esp_stanzas, jp_stanzas, esp_loaded:!!espData};
  // If no ESP data, fetch asynchronously
  if(!espData){
    fetchLyrics(espNum, title).then(data=>{
      if(data){
        // Cache in localStorage
        try{localStorage.setItem(`hymn_esp_${espNum}`,JSON.stringify(data));}catch{}
        let stanzas = data.verses||[];
        if(data.chorus) stanzas = stanzas.flatMap((v,i)=>i===0?[v,data.chorus]:[data.chorus,v]).filter((v,i,a)=>JSON.stringify(v)!==JSON.stringify(a[i-1]||null));
        slideCache[espNum].esp_stanzas = stanzas;
        slideCache[espNum].esp_loaded = true;
        if(currentEspNum===espNum) renderCurrentSlide(false);
      }
    });
  }
}

// ══════════════════════════════════════════
//  RENDER SLIDE
// ══════════════════════════════════════════
function renderCurrentSlide(animate=true){
  if(!currentEspNum){showSlide(document.getElementById('slide-welcome'));return;}
  const c = slideCache[currentEspNum]; if(!c) return;
  const si = currentStanzaIdx;
  const tot = totalStanzas(currentEspNum);
  const espArr = (c.esp_stanzas||[])[si]||null;
  const jpArr  = (c.jp_stanzas||[])[si]||null;

  // Get or create slide element
  const slideId = `slide-${currentEspNum}`;
  let sl = document.getElementById(slideId);
  if(!sl){
    sl = document.createElement('div');
    sl.id = slideId;
    sl.className = 'slide hymn-slide';
    slidesWrap.appendChild(sl);
  }

  // Font sizes
  const espLines = espArr?espArr.length:0;
  const jpLines  = jpArr?jpArr.length:0;
  const maxLines = (showEsp&&showJpn)?(espLines+jpLines):showEsp?espLines:jpLines;
  let fs;
  if(maxLines<=3)fs='clamp(26px,5.5vw,50px)';
  else if(maxLines<=5)fs='clamp(22px,4.5vw,42px)';
  else if(maxLines<=7)fs='clamp(18px,3.8vw,35px)';
  else if(maxLines<=10)fs='clamp(16px,3.2vw,28px)';
  else if(maxLines<=14)fs='clamp(13px,2.6vw,23px)';
  else fs='clamp(11px,2.2vw,19px)';
  const fsSm=`calc(${fs} * .82)`;

  // Dots
  const dots = tot>1?Array.from({length:Math.min(tot,12)},(_,i)=>`<div class="sdot${i===si?' on':''}"></div>`).join(''):'';
  const dotsHtml = tot>1?`<div class="stanza-dots">${dots}</div>`:'';

  // ESP lines HTML
  function espLinesHTML(){
    if(!espArr||!showEsp) return '';
    const isChorus = typeof espArr[0]==='string'&&/Coro|Estribillo/.test(espArr[0]||'');
    return espArr.map(l=>{
      const cls = 'll ll-esp'+(isChorus?' ll-chorus-esp':'');
      return `<div class="${cls}" style="font-size:${fs}">${esc(l)}</div>`;
    }).join('');
  }
  // JP lines HTML
  function jpLinesHTML(){
    if(!jpArr||!showJpn) return '';
    return jpArr.map(raw=>{
      const l=raw.trim().replace(/　/g,'　');
      const isCh=CHORUS_P.test(l),isHal=HALLE_P.test(l),isVN=VNUM_P.test(l);
      let cls='ll ll-jp';
      if(isCh)cls+=' ll-chorus-jp';
      else if(isHal)cls+=' ll-halle';
      const fsMod=isCh||isVN?fsSm:fs;
      return `<div class="${cls}" style="font-size:${fsMod}">${addFG(esc(l))}</div>`;
    }).join('');
  }

  // Loading indicator if ESP not loaded
  const loadingHtml = (!c.esp_loaded&&showEsp&&API_KEY!=='TU_API_KEY_AQUI')
    ?`<div class="ll ll-loading" style="font-size:${fsSm}">Cargando letra...</div>`:'';
  const noApiHtml = (!c.esp_loaded&&showEsp&&API_KEY==='TU_API_KEY_AQUI')
    ?`<div class="ll ll-err" style="font-size:${fsSm}">Sin API key — letra no disponible</div>`:'';

  const hasBoth = showEsp&&showJpn&&espArr&&jpArr;
  let lyricsHTML='';
  if(hasBoth){
    lyricsHTML=`<div class="stanza-block"><div class="lang-esp">${espLinesHTML()}${loadingHtml}${noApiHtml}</div><div class="lang-divider"></div><div class="lang-jp">${jpLinesHTML()}</div></div>`;
  } else {
    lyricsHTML=`<div class="stanza-block">${espLinesHTML()||jpLinesHTML()}${loadingHtml}${noApiHtml}</div>`;
  }

  sl.innerHTML=`
    <div class="hymn-hdr">
      <div class="hymn-num-badge">${currentEspNum}</div>
      <div class="hymn-titles">
        ${showEsp?`<div class="hymn-title-esp">${esc(c.title)}</div>`:''}
        ${showJpn&&c.title_jp?`<div class="hymn-title-jp">${esc(c.title_jp)}</div>`:''}
      </div>
      <div class="hymn-stanza-info">${si+1}/${tot}${dotsHtml}</div>
    </div>
    <div class="lyrics-body">${lyricsHTML}</div>
    <div class="slide-footer"><div class="sf-line"></div><span class="sf-pg">${si+1} / ${tot}</span><div class="sf-line r"></div></div>
  `;

  showSlide(sl);
  if(animate){
    const lns=sl.querySelectorAll('.ll');
    lns.forEach(l=>l.classList.remove('v'));
    lns.forEach((l,i)=>setTimeout(()=>l.classList.add('v'),30+i*55));
  } else {
    sl.querySelectorAll('.ll').forEach(l=>l.classList.add('v'));
  }
  document.getElementById('hdr-num').textContent=`${currentEspNum} / 695`;
  document.getElementById('pg').textContent=`${si+1} / ${tot}`;
  document.getElementById('btn-prev').disabled=currentEspNum===1&&si===0;
  document.getElementById('btn-next').disabled=false;
}

function showSlide(el){
  if(currentSlideEl===el) return;
  currentSlideEl.classList.remove('active');
  el.classList.add('active');
  currentSlideEl=el;
}

// ══════════════════════════════════════════
//  NAVIGATE
// ══════════════════════════════════════════
async function openHymn(espNum, stanza=0){
  hideBrowse();
  showLoading();
  await buildCache(espNum);
  currentEspNum=espNum;
  currentStanzaIdx=Math.max(0,Math.min(stanza,totalStanzas(espNum)-1));
  renderCurrentSlide(true);
  updateSidebar();
  hideLoading();
}

function nextStanza(){
  if(!currentEspNum) return;
  const tot=totalStanzas(currentEspNum);
  if(currentStanzaIdx<tot-1){currentStanzaIdx++;renderCurrentSlide(true);}
  else {
    // Move to next hymn
    const next=currentEspNum<695?currentEspNum+1:null;
    if(next) openHymn(next,0);
  }
}
function prevStanza(){
  if(!currentEspNum){return;}
  if(currentStanzaIdx>0){currentStanzaIdx--;renderCurrentSlide(true);}
  else {
    const prev=currentEspNum>1?currentEspNum-1:null;
    if(prev) openHymn(prev,0);
    else {currentEspNum=null;currentStanzaIdx=0;showSlide(document.getElementById('slide-welcome'));}
  }
}

function showLoading(){document.getElementById('loading').classList.add('show')}
function hideLoading(){document.getElementById('loading').classList.remove('show')}

// ══════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════
const sbList=document.getElementById('sb-list');
function buildSidebar(filter=''){
  sbList.innerHTML='';
  const fl=filter.toLowerCase();
  for(let n=1;n<=695;n++){
    const title=esp_titles[String(n)]||`Himno ${n}`;
    const hasJP=!!(esp_to_jp[String(n)]||userJP[String(n)]);
    if(fl&&!title.toLowerCase().includes(fl)&&!String(n).includes(fl)) continue;
    const jpData=esp_to_jp[String(n)];
    const el=document.createElement('div');
    el.className='sb-item'+(currentEspNum===n?' cur':'');
    el.innerHTML=`<span class="sb-num">${n}</span><div><span class="sb-title-esp">${esc(title)}</span>${jpData?`<span class="sb-title-jp">${esc(jpData.title_jp||'')}</span>`:''}</div><div class="${hasJP?'sb-has-jp':'sb-no-jp'}" title="${hasJP?'Tiene japonés':'Sin japonés'}"></div>`;
    el.addEventListener('click',()=>{openHymn(n,0);closeSidebar();});
    sbList.appendChild(el);
  }
}
function updateSidebar(){
  document.querySelectorAll('.sb-item').forEach(el=>{
    const n=parseInt(el.querySelector('.sb-num').textContent);
    el.classList.toggle('cur',n===currentEspNum);
  });
  const cur=sbList.querySelector('.sb-item.cur');
  if(cur) cur.scrollIntoView({block:'nearest'});
}
buildSidebar();

let sbOpen=false;
const sb=document.getElementById('sidebar'),ov=document.getElementById('overlay');
function openSidebar(){sbOpen=true;sb.classList.add('open');ov.classList.add('show');buildSidebar(document.getElementById('sb-search').value)}
function closeSidebar(){sbOpen=false;sb.classList.remove('open');ov.classList.remove('show')}
document.getElementById('menu-btn').addEventListener('click',()=>sbOpen?closeSidebar():openSidebar());
ov.addEventListener('click',closeSidebar);
document.getElementById('sb-search').addEventListener('input',e=>buildSidebar(e.target.value));

// ══════════════════════════════════════════
//  BROWSE VIEW
// ══════════════════════════════════════════
let browseVisible=false;
function buildBrowse(){
  const bv=document.getElementById('browse-view');
  if(bv.children.length>2) return;
  const section=document.createElement('div');
  section.className='browse-section';
  section.innerHTML='<div class="browse-section-title">Todos los Himnos — 695</div><div class="browse-grid" id="bg-main"></div>';
  bv.appendChild(section);
  const grid=document.getElementById('bg-main');
  for(let n=1;n<=695;n++){
    const title=esp_titles[String(n)]||`Himno ${n}`;
    const jpData=esp_to_jp[String(n)]||userJP[String(n)];
    const card=document.createElement('div');
    card.className='browse-card';
    card.innerHTML=`${jpData?'<div class="bc-jp-dot"></div>':''}<div class="bc-num">${n}</div><div class="bc-title">${esc(title)}</div>${jpData?`<div class="bc-jp">${esc((jpData.title_jp||'').substring(0,20))}</div>`:''}`;
    card.addEventListener('click',()=>{openHymn(n,0);hideBrowse();});
    grid.appendChild(card);
  }
}
function showBrowse(){browseVisible=true;buildBrowse();document.getElementById('browse-view').classList.add('show');document.getElementById('present-view').classList.add('hidden')}
function hideBrowse(){browseVisible=false;document.getElementById('browse-view').classList.remove('show');document.getElementById('present-view').classList.remove('hidden')}
document.getElementById('btn-browse').addEventListener('click',()=>browseVisible?hideBrowse():showBrowse());

// ══════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════
const searchEl=document.getElementById('search');
const srEl=document.getElementById('search-results');
searchEl.addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  srEl.innerHTML='';
  if(!q){srEl.style.display='none';return;}
  srEl.style.display='block';
  let count=0;
  for(let n=1;n<=695&&count<12;n++){
    const title=esp_titles[String(n)]||'';
    const jpData=esp_to_jp[String(n)];
    if(title.toLowerCase().includes(q)||String(n)===q||String(n).startsWith(q)){
      const el=document.createElement('div');el.className='sr-item';
      el.innerHTML=`<span class="sr-num">${n}</span><div><div class="sr-title-esp">${esc(title)}</div>${jpData?`<div class="sr-title-jp">${esc(jpData.title_jp||'')}</div>`:''}</div>`;
      el.addEventListener('click',()=>{searchEl.value='';srEl.style.display='none';openHymn(n,0);});
      srEl.appendChild(el);count++;
    }
  }
  if(count===0){srEl.innerHTML='<div style="padding:10px 16px;color:var(--muted);font-size:.8rem">Sin resultados</div>';}
});
document.addEventListener('click',e=>{if(!e.target.closest('#search-wrap'))srEl.style.display='none'});

// ══════════════════════════════════════════
//  LANGUAGE TOGGLE
// ══════════════════════════════════════════
document.querySelectorAll('.lt-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const lang=btn.dataset.lang;
    if(lang==='esp') showEsp=!showEsp;
    else showJpn=!showJpn;
    if(!showEsp&&!showJpn){showEsp=true;showJpn=true;}
    document.querySelectorAll('.lt-btn').forEach(b=>{
      b.classList.toggle('on',b.dataset.lang==='esp'?showEsp:showJpn);
    });
    if(currentEspNum) renderCurrentSlide(false);
  });
});

// ══════════════════════════════════════════
//  EDITOR
// ══════════════════════════════════════════
const ep=document.getElementById('editor-panel');
document.getElementById('btn-edit').addEventListener('click',()=>{
  if(!currentEspNum) return;
  const n=currentEspNum;
  document.getElementById('ep-num').value=n;
  const existing=userJP[String(n)]||(esp_to_jp[String(n)]||{});
  document.getElementById('ep-title-jp').value=existing.title_jp||existing.title||'';
  document.getElementById('ep-lyrics-jp').value=(existing.lines||[]).join('
');
  ep.classList.add('open');ov.classList.add('show');
});
document.getElementById('ep-close').addEventListener('click',()=>{ep.classList.remove('open');ov.classList.remove('show')});
document.getElementById('ep-save').addEventListener('click',()=>{
  const n=parseInt(document.getElementById('ep-num').value);
  const title=document.getElementById('ep-title-jp').value.trim();
  const lines=document.getElementById('ep-lyrics-jp').value.split('
');
  userJP[String(n)]={title_jp:title,lines};
  saveUserJP(userJP);
  delete slideCache[n];
  ep.classList.remove('open');ov.classList.remove('show');
  if(currentEspNum===n){buildCache(n).then(()=>renderCurrentSlide(false));}
  // Rebuild sidebar
  buildSidebar(document.getElementById('sb-search').value);
  alert('✓ Guardado. Los cambios se mostrarán en el himno.');
});

// ══════════════════════════════════════════
//  KEYBOARD & TOUCH
// ══════════════════════════════════════════
document.getElementById('btn-next').addEventListener('click',nextStanza);
document.getElementById('btn-prev').addEventListener('click',prevStanza);
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='Escape'){closeSidebar();ep.classList.remove('open');ov.classList.remove('show');hideBrowse();return;}
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextStanza();}
  if(e.key==='ArrowLeft'){e.preventDefault();prevStanza();}
  if(e.key.toLowerCase()==='f'){document.documentElement.requestFullscreen?.();}
  if(e.key>='1'&&e.key<='9'&&e.ctrlKey){openHymn(parseInt(e.key));}
});
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>45){dx<0?nextStanza():prevStanza();}
},{passive:true});

// ══════════════════════════════════════════
//  BACKGROUND
// ══════════════════════════════════════════
const bgc=document.getElementById('bgc'),bgx=bgc.getContext('2d');
function drawBg(){
  const W=window.innerWidth,H=window.innerHeight;
  bgc.width=W;bgc.height=H;
  bgx.fillStyle='#0C1A28';bgx.fillRect(0,0,W,H);
  const g=bgx.createRadialGradient(W/2,H/2,H*.05,W/2,H/2,H*.7);
  g.addColorStop(0,'rgba(20,40,60,.8)');g.addColorStop(1,'rgba(12,26,40,0)');
  bgx.fillStyle=g;bgx.fillRect(0,0,W,H);
  bgx.strokeStyle='rgba(201,168,76,.025)';bgx.lineWidth=1;
  for(let x=0;x<W;x+=80){bgx.beginPath();bgx.moveTo(x,0);bgx.lineTo(x,H);bgx.stroke()}
  for(let y=0;y<H;y+=80){bgx.beginPath();bgx.moveTo(0,y);bgx.lineTo(W,y);bgx.stroke()}
  bgx.strokeStyle='rgba(201,168,76,.03)';bgx.lineWidth=22;bgx.lineCap='round';
  bgx.beginPath();bgx.moveTo(W/2,H*.2);bgx.lineTo(W/2,H*.8);bgx.stroke();
  bgx.beginPath();bgx.moveTo(W*.28,H*.38);bgx.lineTo(W*.72,H*.38);bgx.stroke();
}
window.addEventListener('resize',drawBg);drawBg();

function petal(){

  p.style.animationDuration=d+'s';p.style.animationDelay=dl+'s';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),(d+dl)*1000+500);
}
for(let i=0;i<6;i++) petal();
setInterval(petal,4000);
